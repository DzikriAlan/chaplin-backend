[build]
builder = "nixpacks"
buildCommand = "npm install && npm run build"

[deploy]
startCommand = "node --max-old-space-size=512 dist/main"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

# Required environment variables on Railway:
# DATABASE_URL        - PostgreSQL connection string
# JWT_SECRET          - Same value as NEXTAUTH_SECRET on the frontend
# REDIS_URL           - Redis connection string (for BullMQ queues)
# SUPABASE_URL        - Supabase project URL
# SUPABASE_SERVICE_KEY - Supabase service role key
# GOOGLE_CLIENT_ID    - Google OAuth client ID
# GOOGLE_CLIENT_SECRET - Google OAuth client secret
# GOOGLE_REDIRECT_URI - Google OAuth redirect URI (backend callback)
# OPENAI_API_KEY      - OpenAI API key (for embeddings/AI)
# PORT                - (optional) defaults to 3001
